# NOTE: conda-forge only, deliberately. Mixing in the `defaults` channel for
# the R stack is a common cause of an ICU/stringi ABI mismatch at runtime:
#   "unable to load shared object 'stringi.so' ... libicui18n.so.58: cannot
#    open shared object file: No such file or directory"
# If you hit that error on an existing env, either force-reinstall the
# offending packages (`conda install -c conda-forge icu r-stringi
# --force-reinstall -y`) or recreate the env with
# `conda config --set channel_priority strict` set first.
name: eace-trauma-outcomes
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pandas>=2.0
  - numpy>=1.24
  - scikit-learn>=1.3
  - statsmodels>=0.14
  - xgboost>=2.0
  - matplotlib>=3.7
  - seaborn>=0.13
  - pyarrow>=14.0
  - r-base=4.2
  - r-tidyverse
  - r-data.table
  - r-lme4
  - r-nlme
  - r-matchit
  - r-rmarkdown
  - r-knitr
  - r-table1
  - r-survival
  - r-survminer
  - pip
  - pip:
      - polars>=0.20
      - lifelines>=0.27
      - shap>=0.44
      - plotly>=5.18
      - streamlit>=1.32
